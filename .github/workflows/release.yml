name: Release

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run ci

      - name: Set package version from tag
        run: npm version --no-git-tag-version "${RELEASE_TAG#v}"
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Build release package
        run: npm pack

      - name: Create GitHub Release
        run: |
          gh release create "$RELEASE_TAG" *.tgz \
            --title "pi-session-handover $RELEASE_TAG" \
            --notes "Release package for pi-session-handover. Install with: pi install git:github.com/HackXIt/pi-session-handover@$RELEASE_TAG"
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
