image: node:24-alpine

stages:
  - test
  - package
  - deploy
  - release

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - npm ci --prefer-offline

.semver_tag_rules: &semver_tag_rules
  - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'

test:
  stage: test
  script:
    - npm run ci

package:
  stage: package
  script:
    - npm pack
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 14 days

publish:gitlab-npm:
  stage: deploy
  rules: *semver_tag_rules
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - npm version --no-git-tag-version "$VERSION"
    - |
      cat > .npmrc <<EOF
      @hackxit:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/
      ${CI_API_V4_URL#https:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - npm publish
  environment:
    name: gitlab-npm

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  needs:
    - publish:gitlab-npm
  rules: *semver_tag_rules
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "pi-session-handover $CI_COMMIT_TAG"
    description: |
      Published @hackxit/pi-session-handover to the GitLab npm Package Registry.

      Install with Pi after configuring the @hackxit npm scope for this GitLab instance:

      ```bash
      pi install npm:@hackxit/pi-session-handover@<version>
      ```

      Use the tag as `<version>` without the optional leading `v`.
