image: node:24-alpine

stages:
  - test
  - package
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - npm ci --prefer-offline

test:
  stage: test
  script:
    - npm run ci

package:
  stage: package
  script:
    - npm pack
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 14 days

publish:gitlab-npm:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - npm version --no-git-tag-version "$VERSION"
    - |
      cat > .npmrc <<EOF
      @hackxit:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/
      ${CI_API_V4_URL#https:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - npm publish
  environment:
    name: gitlab-npm
